name: Deploy Backend Petinder

on:
  push:
    branches:
      - develop

jobs:
# Rodando testes antes do build
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository para testes
        uses: actions/checkout@v4

      - name: Configuração do JDK 21 para testes
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configuração do cache Maven para testes
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Rodando testes
        run: mvn -e -B test

# Build do projeto e push da imagem Docker para o Docker Hub após os testes passarem
  build:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configuração do JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configuração de cache do Maven
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Rodando testes
        run: mvn -e -B test

      - name: Build com Maven
        run: mvn -e -B clean package

      - name: Configuração do Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/deploy-petinder:backend-v1

# Deploy na instância 1
  deploy_instancia_1:
    needs: build
    runs-on: [self-hosted, backend-runner]

    steps:
      - name: Pull da nova imagem do Docker Hub
        run: |
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/deploy-petinder:backend-v1

      - name: Parar e remover container antigo (se existir)
        run: |
          sudo docker stop petinder-backend || true
          sudo docker rm petinder-backend || true

      - name: Subir novo container backend
        run: |
          sudo docker run -d \
            --name petinder-backend \
            --restart=always \
            -p 8080:8080 \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e SENHA_PETINDER_EMAIL="${{ secrets.SENHA_PETINDER_EMAIL }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
            -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET_NOME }}" \
            -e RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" \
            -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/deploy-petinder:backend-v1

      - name: Mostrar containers rodando
        run: sudo docker ps -a

# Deploy na instância 2
  deploy_instancia_2:
    needs: build
    runs-on: [self-hosted, backend-runner]

    steps:
      - name: Pull da nova imagem do Docker Hub
        run: |
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/deploy-petinder:backend-v1

      - name: Parar e remover container antigo (se existir)
        run: |
          sudo docker stop petinder-backend || true
          sudo docker rm petinder-backend || true

      - name: Subir novo container backend
        run: |
          sudo docker run -d \
            --name petinder-backend \
            --restart=always \
            -p 8080:8080 \
            -e DB_URL="${{ secrets.DB_URL }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e SENHA_PETINDER_EMAIL="${{ secrets.SENHA_PETINDER_EMAIL }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
            -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET_NOME }}" \
            -e RABBITMQ_HOST="${{ secrets.RABBITMQ_HOST }}" \
            -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/deploy-petinder:backend-v1

      - name: Mostrar containers rodando
        run: sudo docker ps -a