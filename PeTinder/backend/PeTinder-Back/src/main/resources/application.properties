spring.application.name=crud-imagem
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

logging.level.org.springframework=DEBUG
logging.level.org.springframework.security=INFO
logging.config=classpath:log4j2.xml

spring.servlet.multipart.max-file-size=300MB
spring.servlet.multipart.max-request-size=300MB
server.tomcat.max-http-form-post-size=300MB

jwt.
jwt.validity=3600000

app.email.from.address=suportepetinder360@gmail.com
app.email.from.name=Equipe PeTinder
app.email.smtp.host=smtp.gmail.com
app.email.smtp.port=587
app.email.smtp.username=${app.email.from.address}
app.email.smtp.password=${SENHA_PETINDER_EMAIL}

spring.mail.host=${app.email.smtp.host}
spring.mail.port=${app.email.smtp.port}
spring.mail.username=${app.email.smtp.username}
spring.mail.password=${app.email.smtp.password}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${app.email.smtp.host}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

gemini.api.key={senha}

logging.level.cruds.notificacoes=INFO